async function loadStats(){

// BOOKINGS COUNT
const { count: bookingsCount } = await client
.from("bookings")
.select("*", { count: "exact", head: true });

// USERS COUNT
const { count: usersCount } = await client
.from("users")
.select("*", { count: "exact", head: true });

// PACKAGES COUNT

.from("packages")
.select("*", { count: "exact", head: true });

document.getElementById("totalBookings").innerText =
bookingsCount || 0;

document.getElementById("totalUsers").innerText =
usersCount || 0;

document.getElementById("totalPackages").innerText =
packagesCount || 0;

}
