<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:#f4f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:#fff;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.logo{
  width:70px;
  margin-bottom:10px;
}

h2{
  color:#0a2d74;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:10px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:#0a2d74;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<img src="logoot.png" class="logo">

<h2>Admin Panel</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script>
const SUPABASE_URL = "https://ouknykcoqvwuedlkctgz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91a255a2NvcXZ3dWVkbGtjdGd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTAyNjcsImV4cCI6MjA5Mzk4NjI2N30.SF4VoPIiNiqwjXCKeHTBHpLIW_IehimIRUNlHZ8Gw58";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await client.auth.signInWithPassword({
  email: email,
  password: password
});

if(error){
  alert("Login Failed: " + error.message);
  return;
}

alert("Login Success");
window.location.href = "dashboard.html";

}
</script>

</body>
</html>
